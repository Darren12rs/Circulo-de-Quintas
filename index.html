<!doctype html>

<html lang="es">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Círculo de Quintas Responsivo</title>

        <link rel="stylesheet" href="estilos.css" />
    </head>

    <body>
        <div class="pantalla-completa">
            <header>
                <h1>CÍRCULO DE QUINTAS</h1>
                <p>Selecciona una nota mayor (exterior) o menor (interior)</p>
            </header>
            <div id="contenedor">
                <object id="circulo" data="circulo.svg" type="image/svg+xml"></object>

                <div id="eje-mayor" class="eje-abanico">
                    <img src="AbaMayor.svg" alt="Abanico Mayor" id="AbaMayor" />
                </div>

                <div id="eje-menor" class="eje-abanico">
                    <img src="AbaMenor.svg" alt="Abanico Menor" id="AbaMenor" />
                </div>

                <div class="nota-mayor" style="--i: 0"></div>

                <div class="nota-mayor" style="--i: 1"></div>

                <div class="nota-mayor" style="--i: 2"></div>

                <div class="nota-mayor" style="--i: 3"></div>

                <div class="nota-mayor" style="--i: 4"></div>

                <div class="nota-mayor" style="--i: 5"></div>

                <div class="nota-mayor" style="--i: 6"></div>

                <div class="nota-mayor" style="--i: 7"></div>

                <div class="nota-mayor" style="--i: 8"></div>

                <div class="nota-mayor" style="--i: 9"></div>

                <div class="nota-mayor" style="--i: 10"></div>

                <div class="nota-mayor" style="--i: 11"></div>

                <div class="nota-menor" style="--i: 0"></div>

                <div class="nota-menor" style="--i: 1"></div>

                <div class="nota-menor" style="--i: 2"></div>

                <div class="nota-menor" style="--i: 3"></div>

                <div class="nota-menor" style="--i: 4"></div>

                <div class="nota-menor" style="--i: 5"></div>

                <div class="nota-menor" style="--i: 6"></div>

                <div class="nota-menor" style="--i: 7"></div>

                <div class="nota-menor" style="--i: 8"></div>

                <div class="nota-menor" style="--i: 9"></div>

                <div class="nota-menor" style="--i: 10"></div>

                <div class="nota-menor" style="--i: 11"></div>
            </div>
        </div>
        <script src="script.js?v=3"></script>
    </body>
</html>
